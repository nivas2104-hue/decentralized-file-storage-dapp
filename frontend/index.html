<!doctype html>
<html>
  <head>
    <title>Secure File Storage DApp</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #060a12;
        --surface: #0d1525;
        --surface2: #111c32;
        --border: rgba(56, 189, 248, 0.12);
        --accent: #38bdf8;
        --accent2: #818cf8;
        --text: #e2e8f0;
        --muted: #4a5568;
        --success: #34d399;
        --warn: #facc15;
        --danger: #f87171;
        --mono: "Space Mono", monospace;
        --sans: "DM Sans", sans-serif;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--sans);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 40px 20px;
        background-image:
          radial-gradient(
            ellipse 80% 60% at 50% -20%,
            rgba(56, 189, 248, 0.07) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 60% 40% at 80% 100%,
            rgba(129, 140, 248, 0.05) 0%,
            transparent 60%
          );
      }
      .app {
        width: 100%;
        max-width: 520px;
      }
      .header {
        text-align: center;
        margin-bottom: 28px;
      }
      .header-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        background: linear-gradient(
          135deg,
          rgba(56, 189, 248, 0.15),
          rgba(129, 140, 248, 0.15)
        );
        border: 1px solid var(--border);
        border-radius: 14px;
        font-size: 22px;
        margin-bottom: 14px;
      }
      .header h1 {
        font-family: var(--mono);
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.04em;
      }
      .header p {
        font-size: 12px;
        color: var(--muted);
        margin-top: 5px;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }
      #wallet {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 100px;
        padding: 5px 12px 5px 8px;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--accent);
        margin-bottom: 20px;
      }
      #wallet::before {
        content: "";
        display: block;
        width: 7px;
        height: 7px;
        background: var(--success);
        border-radius: 50%;
        box-shadow: 0 0 6px var(--success);
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 16px;
      }
      .card-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
        margin-bottom: 12px;
        font-family: var(--mono);
      }
      .file-zone {
        border: 1.5px dashed rgba(56, 189, 248, 0.2);
        border-radius: 12px;
        padding: 22px;
        text-align: center;
        cursor: pointer;
        transition: 0.2s;
        position: relative;
        background: rgba(56, 189, 248, 0.02);
      }
      .file-zone:hover {
        border-color: rgba(56, 189, 248, 0.45);
        background: rgba(56, 189, 248, 0.05);
      }
      .file-zone input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
      }
      .file-zone-icon {
        font-size: 26px;
        margin-bottom: 6px;
      }
      .file-zone-text {
        font-size: 13px;
        color: var(--muted);
      }
      .file-zone-text span {
        color: var(--accent);
        font-weight: 500;
      }
      #fileName {
        font-size: 12px;
        color: var(--accent);
        margin-top: 8px;
        font-family: var(--mono);
        min-height: 16px;
      }
      .btn-row {
        display: flex;
        gap: 10px;
        margin-top: 16px;
      }
      button {
        font-family: var(--sans);
        font-size: 13px;
        font-weight: 500;
        padding: 9px 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.18s;
        letter-spacing: 0.01em;
      }
      .btn-primary {
        background: var(--accent);
        color: #060a12;
        flex: 1;
      }
      .btn-primary:hover {
        background: #7dd3fc;
        transform: translateY(-1px);
        box-shadow: 0 4px 14px rgba(56, 189, 248, 0.3);
      }
      .btn-secondary {
        background: var(--surface2);
        color: var(--text);
        border: 1px solid var(--border);
        flex: 1;
      }
      .btn-secondary:hover {
        background: #1a2640;
        transform: translateY(-1px);
      }
      .status-card {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px 16px;
        margin-top: 14px;
        font-size: 13px;
      }
      .loader-text {
        color: var(--warn);
        font-family: var(--mono);
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .loader-text::before {
        content: "";
        display: inline-block;
        width: 10px;
        height: 10px;
        border: 2px solid var(--warn);
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .hash-val {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--accent);
        word-break: break-all;
        line-height: 1.6;
      }
      .meta-row {
        font-size: 11px;
        color: var(--muted);
        margin-top: 4px;
        font-family: var(--mono);
      }
      .tx-link {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 12px;
        color: var(--accent2);
        text-decoration: none;
        margin-top: 8px;
        font-family: var(--mono);
      }
      .tx-link:hover {
        text-decoration: underline;
      }
      .copy-btn {
        font-size: 10px;
        padding: 2px 8px;
        background: rgba(56, 189, 248, 0.1);
        border: 1px solid rgba(56, 189, 248, 0.2);
        color: var(--accent);
        border-radius: 5px;
        cursor: pointer;
        margin-left: 6px;
        vertical-align: middle;
        transition: 0.15s;
      }
      .copy-btn:hover {
        background: rgba(56, 189, 248, 0.2);
      }
      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 14px;
      }
      .section-title {
        font-family: var(--mono);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--muted);
      }
      .count-badge {
        font-family: var(--mono);
        font-size: 10px;
        padding: 2px 8px;
        background: rgba(56, 189, 248, 0.08);
        border: 1px solid rgba(56, 189, 248, 0.15);
        color: var(--accent);
        border-radius: 100px;
      }
      .history-item {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
        margin-bottom: 10px;
        transition: 0.2s;
        animation: fadeIn 0.3s ease both;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .history-item:hover {
        border-color: rgba(56, 189, 248, 0.25);
        transform: translateY(-1px);
      }
      .history-item .hash-val a {
        color: var(--accent);
        text-decoration: none;
      }
      .history-item .hash-val a:hover {
        text-decoration: underline;
      }
      .divider {
        height: 1px;
        background: var(--border);
        margin: 10px 0;
      }
      .empty-state {
        text-align: center;
        padding: 30px;
        color: var(--muted);
        font-size: 13px;
      }
      .empty-state-icon {
        font-size: 28px;
        margin-bottom: 8px;
      }
      .success-dot {
        display: inline-block;
        width: 7px;
        height: 7px;
        background: var(--success);
        border-radius: 50%;
        margin-right: 5px;
        box-shadow: 0 0 6px var(--success);
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="header">
        <div class="header-icon">📁</div>
        <h1>SECURE FILE STORAGE</h1>
        <p>Upload → IPFS → Blockchain · Sepolia</p>
      </div>
      <div style="text-align: center">
        <p id="wallet">Connecting wallet...</p>
      </div>
      <div class="card" style="margin-top: 16px">
        <div class="card-label">Select File</div>
        <div class="file-zone" id="fileZone">
          <input type="file" id="fileInput" onchange="onFileChange(this)" />
          <div class="file-zone-icon">⬆</div>
          <div class="file-zone-text">
            <span>Browse</span> or drop a file here
          </div>
          <div id="fileName"></div>
        </div>
        <div class="btn-row">
          <button class="btn-primary" onclick="uploadFile()">
            Upload to IPFS
          </button>
          <button class="btn-secondary" onclick="getFile()">Latest File</button>
        </div>
      </div>
      <div id="status"></div>
      <div class="card">
        <div class="section-header">
          <span class="section-title">On-chain History</span>
          <span class="count-badge" id="countBadge">—</span>
        </div>
        <div id="history">
          <div class="empty-state">
            <div class="empty-state-icon">🔗</div>
            Loading blockchain data...
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3/dist/web3.min.js"></script>
    <script>
      let web3, contract;
      const contractAddress = "0x51b252dC4Cf0EF7b8e1540E74204C5a68AEb1800";
      const abi = [
        {
          inputs: [{ internalType: "string", name: "_hash", type: "string" }],
          name: "uploadFile",
          outputs: [],
          stateMutability: "nonpayable",
          type: "function",
        },
        {
          inputs: [{ internalType: "uint256", name: "index", type: "uint256" }],
          name: "getFile",
          outputs: [
            { internalType: "string", name: "", type: "string" },
            { internalType: "address", name: "", type: "address" },
            { internalType: "uint256", name: "", type: "uint256" },
          ],
          stateMutability: "view",
          type: "function",
        },
        {
          inputs: [],
          name: "getTotalFiles",
          outputs: [{ internalType: "uint256", name: "", type: "uint256" }],
          stateMutability: "view",
          type: "function",
        },
      ];

      window.onload = async () => {
        web3 = new Web3(window.ethereum);
        await window.ethereum.request({ method: "eth_requestAccounts" });
        const accounts = await web3.eth.getAccounts();
        contract = new web3.eth.Contract(abi, contractAddress);
        window.account = accounts[0];
        const short = accounts[0].slice(0, 6) + "..." + accounts[0].slice(-4);
        document.getElementById("wallet").innerHTML =
          `<span title="${accounts[0]}">${short}</span>`;
        await displayHistory();
      };

      function onFileChange(input) {
        const file = input.files[0];
        document.getElementById("fileName").innerText = file ? file.name : "";
      }

      function copyToClipboard(text) {
        navigator.clipboard.writeText(text);
      }
      function showToast(msg) {
        let toast = document.createElement("div");
        toast.innerText = msg;
        toast.style.position = "fixed";
        toast.style.bottom = "20px";
        toast.style.right = "20px";
        toast.style.background = "#38bdf8";
        toast.style.color = "#000";
        toast.style.padding = "10px 14px";
        toast.style.borderRadius = "8px";
        toast.style.fontSize = "13px";
        toast.style.zIndex = "9999";
        document.body.appendChild(toast);

        setTimeout(() => toast.remove(), 2000);
      }

      async function uploadFile() {
        const file = document.getElementById("fileInput").files[0];
        if (!file) return alert("Select a file first");

        let status = document.getElementById("status");

        status.innerHTML = `
    <div class="status-card">
      <div class="loader-text">Uploading to IPFS...</div>
    </div>`;

        let formData = new FormData();
        formData.append("file", file);

        try {
          let res = await fetch(
            "https://decentralized-file-storage-dapp.onrender.com/upload",
            {
              method: "POST",
              body: formData,
            },
          );

          let data = await res.json();
          console.log(data);

          // 🔥 FIX 1: correct field check
          if (!data.hash) {
            status.innerHTML = `<div class="status-card" style="color:var(--danger)">Upload failed</div>`;
            showToast("Upload failed");
            return;
          }

          // 🔥 FIX 2: correct field usage
          let hash = data.hash;

          status.innerHTML = `
      <div class="status-card">
        <div class="hash-val">
          ${hash}
          <button class="copy-btn" onclick="copyToClipboard('${hash}')">copy</button>
        </div>
        <div class="loader-text" style="margin-top:10px;">Waiting for MetaMask...</div>
      </div>`;

          let tx = await contract.methods
            .uploadFile(hash)
            .send({ from: window.account });

          status.innerHTML = `
      <div class="status-card">
        <div class="hash-val">
          ${hash}
          <button class="copy-btn" onclick="copyToClipboard('${hash}')">copy</button>
        </div>
        <div class="meta-row" style="margin-top:8px;">
          <span class="success-dot"></span>Stored on-chain
        </div>
        <a class="tx-link" target="_blank"
          href="https://sepolia.etherscan.io/tx/${tx.transactionHash}">
          ↗ View on Etherscan
        </a>
      </div>`;

          setTimeout(displayHistory, 2000);
          showToast("File stored successfully!");
        } catch (err) {
          console.error(err);
          status.innerHTML = `<div class="status-card" style="color:var(--danger)">Error uploading file</div>`;
          showToast("Something went wrong");
        }
      }

      async function displayHistory() {
        let historyDiv = document.getElementById("history");

        historyDiv.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🔗</div>
            Loading...
          </div>`;

        try {
          let total = await contract.methods.getTotalFiles().call();
          total = Number(total);

          let myCount = 0;
          let html = "";

          if (total === 0) {
            historyDiv.innerHTML = `
              <div class="empty-state">
                <div class="empty-state-icon">📭</div>
                No files yet
              </div>`;
            document.getElementById("countBadge").innerText = "0 files";
            return;
          }

          for (let i = total - 1; i >= 0; i--) {
            let file = await contract.methods.getFile(i).call();

            let hash = file[0];
            let user = file[1];

            // 🔥 FILTER ONLY YOUR FILES
            if (user.toLowerCase() !== window.account.toLowerCase()) continue;

            myCount++;

            let timestamp = Number(file[2]);
            let time = new Date(timestamp * 1000).toLocaleString();
            let shortUser = user.slice(0, 6) + "..." + user.slice(-4);

            html += `
              <div class="history-item" style="animation-delay:${(total - 1 - i) * 0.05}s">
                <div class="hash-val">
                  <a href="https://gateway.pinata.cloud/ipfs/${hash}" target="_blank">${hash}</a>
                  <button class="copy-btn" onclick="copyToClipboard('${hash}')">copy</button>
                </div>
                <div class="divider"></div>
                <div class="meta-row">👤 ${shortUser} · 🕐 ${time}</div>
              </div>
            `;
          }

          // 🔥 HANDLE CASE: NO FILES FOR THIS USER
          if (myCount === 0) {
            historyDiv.innerHTML = `
              <div class="empty-state">
                <div class="empty-state-icon">📭</div>
                No uploads from this wallet
              </div>`;
          } else {
            historyDiv.innerHTML = html;
          }

          // 🔥 CORRECT COUNT UPDATE
          document.getElementById("countBadge").innerText = myCount + " files";
        } catch (err) {
          historyDiv.innerHTML = `
            <div class="empty-state" style="color:var(--danger)">
              Error: ${err.message}
            </div>`;
        }
      }

      async function getFile() {
        try {
          let total = await contract.methods.getTotalFiles().call();
          total = Number(total);
          if (total === 0) return alert("No files on chain");
          let file = await contract.methods.getFile(total - 1).call();
          let hash = file[0];
          document.getElementById("status").innerHTML =
            `<div class="status-card"><div class="card-label">Latest File</div><div class="hash-val"><a href="https://gateway.pinata.cloud/ipfs/${hash}" target="_blank">${hash}</a><button class="copy-btn" onclick="copyToClipboard('${hash}')">copy</button></div></div>`;
        } catch (err) {
          document.getElementById("status").innerHTML =
            `<div class="status-card" style="color:var(--danger)">Error: ${err.message}</div>`;
        }
      }
    </script>
  </body>
</html>
